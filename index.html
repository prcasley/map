            { name: "Woodmont Townsquare at Washington Twp.", city: "Sewell, NJ", lat: 39.7659, lng: -75.0832, sqft: "330 Luxury Apartments", img: "https://operations2026.wpcomstaging.com/wp-content/uploads/2026/05/woodmont-townsquare-at-washington-twp.avif" }
        ];

        const map = L.map('map', { scrollWheelZoom: false, zoomControl: false, minZoom: 2 });
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '© <a href="https://www.openstreetmap.org/copyright" target="_blank">OpenStreetMap</a> © <a href="https://carto.com/attributions" target="_blank">CARTO</a>',
            subdomains: 'abcd'
        }).addTo(map);

        map.on('focus', () => { map.scrollWheelZoom.enable(); });
        map.on('blur', () => { map.scrollWheelZoom.disable(); });

        const pointBounds = [];

        const hqIcon = L.divIcon({ className: 'custom-logo-marker marker-hq', html: `<img src="${logoUrl}" alt="W">`, iconSize: [52, 52], iconAnchor: [26, 26] });
        const hqMarker = L.marker([hqData.lat, hqData.lng], { icon: hqIcon }).addTo(map);
        hqMarker.bindPopup(`<img class="popup-img" src="https://i0.wp.com/operations2026.wpcomstaging.com/wp-content/uploads/2026/06/HomeOffice.png?ssl=1" alt="Home Office" loading="lazy" onerror="this.style.display='none'"><div class="popup-title">${hqData.title}</div><div class="popup-subtitle">${hqData.address}</div><a href="${hqData.url}" target="_blank" rel="noopener" class="popup-link">Get directions →</a>`, { closeButton: false, offset: [0, -10] });
        pointBounds.push([hqData.lat, hqData.lng]);

        const communityIcon = L.divIcon({ className: 'custom-logo-marker marker-community', html: `<img src="${logoUrl}" alt="W">`, iconSize: [34, 34], iconAnchor: [17, 17] });
        
        marketLocations.forEach(loc => {
            const marker = L.marker([loc.lat, loc.lng], { icon: communityIcon }).addTo(map);
            let popupHtml = `<img class="popup-img" src="${loc.img}" alt="${loc.name}" loading="lazy" onerror="this.style.display='none'"><div class="popup-title" style="margin-bottom:0;">${loc.name}</div><div class="popup-subtitle" style="margin-bottom:0;">${loc.city}</div><a class="popup-dir" href="https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(loc.name + ", " + loc.city)}" target="_blank" rel="noopener">Get Directions →</a>`;
            if(loc.sqft) {
                popupHtml += `<div class="popup-subtitle" style="color:#c9ccd1; font-weight:600; margin-top:4px; margin-bottom:0;">${loc.sqft}</div>`;
            }
            marker.bindPopup(popupHtml, { closeButton: false, offset: [0, -6] });
            marker.on('mouseover', function(e){
                if(!loc.img) return;
                var tip=document.getElementById('wm-hovertip');
                if(!tip){ tip=document.createElement('div'); tip.id='wm-hovertip'; tip.className='wm-hovertip'; document.body.appendChild(tip); }
                tip.innerHTML='<img src="'+loc.img+'" alt="'+loc.name+'" onerror="this.style.display=\'none\'"><div class="wm-hovertip-name">'+loc.name+'</div>'+(loc.city?'<div class="wm-hovertip-sub">'+loc.city+'</div>':'');
                tip.style.display='block';
            });
            marker.on('mousemove', function(e){
                var tip=document.getElementById('wm-hovertip'); if(!tip) return;
                var oe=e.originalEvent; tip.style.left=(oe.clientX+16)+'px'; tip.style.top=(oe.clientY+16)+'px';
            });
            marker.on('mouseout', function(){ var tip=document.getElementById('wm-hovertip'); if(tip) tip.style.display='none'; });
            pointBounds.push([loc.lat, loc.lng]);
        });

        if (pointBounds.length > 0) {
            const bounds = L.latLngBounds(pointBounds);
            map.fitBounds(bounds, { padding: [40, 40], animate: false });
        }

        function adjustLayoutForMobile() {
            const infoCard = document.querySelector('.info-card');
            const wrapper = document.querySelector('.map-wrapper');
            if (window.innerWidth <= 768) { 
                wrapper.parentNode.insertBefore(infoCard, wrapper); 
            } else { 
                wrapper.appendChild(infoCard); 
            }
            map.invalidateSize();
        }

        window.addEventListener('DOMContentLoaded', () => {
            adjustLayoutForMobile();
            setTimeout(() => {
                const finalZoom = window.innerWidth <= 768 ? 12 : 13;
                map.flyTo([hqData.lat, hqData.lng], finalZoom, {
                    duration: 4.5,
                    easeLinearity: 0.25
                });
            }, 1200);
        });

        window.addEventListener('resize', () => {
            map.invalidateSize();
        });
    </script>
